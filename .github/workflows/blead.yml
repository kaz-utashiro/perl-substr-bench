name: blead

on:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        ref: [ 'blead', 'v5.44.0-RC1' ]
    name: ${{ matrix.ref }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: perl/perl5
          ref: ${{ matrix.ref }}
      - name: build
        run: |
          ./Configure -des -Dusedevel >/dev/null
          make -j4 >/dev/null 2>&1
          ./perl -v | grep version
      - name: bench
        run: |
          ./perl -Ilib -MTime::HiRes=time -e '
            my $s = chr(0x3042) x 20_000_000;
            my $n = length $s;
            my $best;
            for my $r (1..3) {
              my $t = time;
              substr($s, int($n * $_ / 101), 10) for 1 .. 100;
              my $e = time - $t;
              $best = $e if !defined $best || $e < $best;
            }
            printf "RESULT ref=%s perl=%vd time=%.4f verdict=%s\n",
              "${{ matrix.ref }}", $^V, $best, $best > 0.1 ? "SLOW" : "ok";
          ' | tee -a "$GITHUB_STEP_SUMMARY"
