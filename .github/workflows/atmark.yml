name: atmark

on:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        perl:
          - '5.12.5'
          - '5.14.4'
          - '5.16.3'
          - '5.18.4'
          - '5.20.3'
          - '5.22.4'
          - '5.24.4'
          - '5.26.3'
          - '5.28.3'
          - '5.30.3'
          - '5.32.1'
          - '5.34.0'
          - '5.34.3'
          - '5.36.0'
          - '5.36.3'
          - '5.38.0'
          - '5.38.5'
          - '5.40.0'
          - '5.40.4'
          - '5.42.0'
          - '5.42.2'
    name: perl ${{ matrix.perl }}
    steps:
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - name: bench
        run: |
          perl -MTime::HiRes=time -e '
            my $s = (chr(0x3042) . chr(0x3044) . chr(0x3046) . " abc ") x 12_000;
            my($t, $c, $e1, $e2);
            $t = time; $c = 0;
            while ($s =~ /abc/g) { my($b, $e) = ($-[0], $+[0]); $c++ }
            $e1 = time - $t;
            $t = time; $c = 0;
            while ($s =~ /abc/gp) { my($b, $e) = (pos($s) - length(${^MATCH}), pos($s)); $c++ }
            $e2 = time - $t;
            printf "RESULT perl=%vd atmark=%.4f pos=%.4f ratio=%.0fx matches=%d\n",
              $^V, $e1, $e2, $e1 / ($e2 || 1e-9), $c;
          ' | tee -a "$GITHUB_STEP_SUMMARY"
